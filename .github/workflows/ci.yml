name: CI/CD

env:
  IMAGE: ghcr.io/nekketsu-git/notion-intelligence:latest

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt ruff

      - name: Lint (ruff)
        run: ruff check . && ruff format --check .

      - name: Test
        run: pytest tests/ -v

  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: vps deploy

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: Nekketsu-GIT
          password: ${{ secrets.GHCR_PAT }}

      - name: Build & push
        run: |
          docker build -t $IMAGE .
          docker push $IMAGE

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    environment: vps deploy

    env:
      GHCR_PAT: ${{ secrets.GHCR_PAT }}

    steps:
      - uses: actions/checkout@v4

      - uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: docker-compose.prod.yml
          target: /opt/apps/notion-intelligence/

      - uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_PAT,IMAGE
          script: |
            set -e
            echo "$GHCR_PAT" | docker login ghcr.io -u Nekketsu-GIT --password-stdin
            docker pull "$IMAGE"
            docker compose -f /opt/apps/notion-intelligence/docker-compose.prod.yml up -d --no-deps notion-web
